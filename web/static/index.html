<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RT Caption Generator</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              950: '#0a0a0f',
            }
          },
          animation: {
            'spin-slow': 'spin 1.4s linear infinite',
            'fade-up': 'fadeUp 0.35s ease-out both',
            'pulse-bar': 'pulseBar 1.8s ease-in-out infinite',
            'shimmer': 'shimmer 2s infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseBar: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
          },
        }
      },
      darkMode: 'class',
    }
  </script>

  <!-- Alpine.js (CDN) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }

    /* CSS variables for dark/light theming */
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --text-primary: #f3f4f6;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --border-color: #374151;
    }

    .light-mode {
      --bg-primary: #f9fafb;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Drop zone hover glow */
    .drop-zone-active {
      border-color: #7c3aed !important;
      background-color: rgba(124, 58, 237, 0.08) !important;
      transform: scale(1.01);
    }

    /* Smooth progress bar */
    .progress-bar {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Light mode adjustments */
    .light-mode {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    .light-mode ::-webkit-scrollbar-thumb {
      background: #d1d5db;
    }
  </style>
</head>

<body class="h-full font-sans antialiased">

<div x-data="app()" x-init="init()" x-cloak class="min-h-screen flex flex-col bg-gradient-to-br from-gray-900 to-gray-950 dark:from-gray-900 dark:to-gray-950">

  <!-- ─── Sticky Nav Bar ──────────────────────────────────────────────────── -->
  <nav class="sticky top-0 z-40 border-b border-gray-800 bg-gray-900/80 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo / Brand -->
        <div class="flex items-center gap-3">
          <svg class="w-6 h-6 text-violet-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
          </svg>
          <h1 class="text-lg font-semibold text-white hidden sm:block">RT Caption Generator</h1>
        </div>

        <!-- Tabs -->
        <div class="flex items-center gap-1">
          <button
            @click="activeTab = 'new-job'"
            :class="activeTab === 'new-job' ? 'text-white border-b-2 border-violet-500' : 'text-gray-400 hover:text-gray-300'"
            class="relative px-4 py-2 text-sm font-medium transition-colors border-b-2 border-transparent">
            New Job
            <!-- Pulsing dot when job is running in background -->
            <span x-show="screen === 'progress' && activeTab !== 'new-job'"
                  class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-violet-500 animate-pulse"></span>
          </button>
          <button
            @click="activeTab = 'history'; loadHistory()"
            :class="activeTab === 'history' ? 'text-white border-b-2 border-violet-500' : 'text-gray-400 hover:text-gray-300'"
            class="px-4 py-2 text-sm font-medium transition-colors border-b-2 border-transparent">
            History
            <span class="ml-1 inline-block px-2 py-0.5 text-xs bg-gray-800 rounded-full text-gray-300" x-text="'(' + historyJobs.length + ')'"></span>
          </button>
        </div>

        <!-- Dark mode toggle -->
        <button @click="darkMode = !darkMode; applyDarkMode()"
                class="p-2 rounded-lg text-gray-400 hover:text-gray-300 hover:bg-gray-800 transition-colors">
          <template x-if="darkMode">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M21.64 13a1 1 0 00-1.05-.14 8 8 0 11-9.95-9.95 1 1 0 00.12 1.05 8 8 0 111.05 9.95z" />
            </svg>
          </template>
          <template x-if="!darkMode">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 2v6m0 10v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M2 12h6m10 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/>
            </svg>
          </template>
        </button>
      </div>
    </div>
  </nav>

  <!-- ─── Main Content ───────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col items-center justify-start py-8 px-4">

    <!-- ─── NEW JOB TAB ───────────────────────────────────────────────────── -->
    <div x-show="activeTab === 'new-job'" class="w-full">

      <!-- ─── Upload Screen ──────────────────────────────────── -->
      <section x-show="screen === 'upload'" class="w-full max-w-4xl space-y-6 animate-fade-up">

        <!-- Job name input -->
        <div class="rounded-xl border border-gray-800 bg-gray-900 p-5">
          <label class="block text-xs text-gray-500 mb-2 uppercase tracking-wider">Job name (optional)</label>
          <input type="text" x-model="jobName" placeholder="e.g., biovera-vo-1"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                        text-gray-200 focus:outline-none focus:border-violet-500 placeholder-gray-600" />
        </div>

        <!-- Drop zones (side-by-side on desktop) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Audio drop zone -->
          <div
            class="relative rounded-xl border-2 border-dashed border-gray-700 bg-gray-900 p-8 text-center
                   cursor-pointer transition-all duration-200"
            :class="audioFile ? 'border-emerald-600 bg-emerald-950/20' : ''"
            @dragenter.prevent="dragCounter.audio++; $el.classList.add('drop-zone-active')"
            @dragleave.prevent="dragCounter.audio--; if (dragCounter.audio === 0) $el.classList.remove('drop-zone-active')"
            @drop.prevent="dragCounter.audio = 0; handleAudioDrop($event); $el.classList.remove('drop-zone-active')"
            @click="$refs.audioInput.click()"
          >
            <input x-ref="audioInput" type="file" accept=".mp3,.wav,.m4a,.aac,.MP3,.WAV,.M4A,.AAC"
                   class="hidden" @change="handleAudioFile($event)" />

            <template x-if="!audioFile">
              <div>
                <svg class="mx-auto w-12 h-12 text-gray-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                <p class="text-gray-300 font-medium">Drop audio here</p>
                <p class="text-gray-500 text-sm mt-1">MP3 · WAV · M4A · AAC</p>
              </div>
            </template>
            <template x-if="audioFile">
              <div class="space-y-2">
                <div class="flex items-center justify-center gap-2">
                  <svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                  <span class="text-emerald-300 font-medium truncate" x-text="audioFile.name"></span>
                </div>
                <div class="text-xs text-gray-400 space-y-0.5">
                  <p x-text="getFileSize(audioFile.size)"></p>
                  <p x-text="'~' + getAudioDuration(audioFile.size) + ' min audio'"></p>
                </div>
                <button class="text-gray-500 hover:text-red-400 transition-colors text-xs mt-2"
                        @click.stop="audioFile = null; audioMetadata = ''">Change file</button>
              </div>
            </template>
          </div>

          <!-- Script drop zone -->
          <div
            class="relative rounded-xl border-2 border-dashed border-gray-700 bg-gray-900 p-8 text-center
                   cursor-pointer transition-all duration-200"
            :class="scriptFile ? 'border-emerald-600 bg-emerald-950/20' : ''"
            @dragenter.prevent="dragCounter.script++; $el.classList.add('drop-zone-active')"
            @dragleave.prevent="dragCounter.script--; if (dragCounter.script === 0) $el.classList.remove('drop-zone-active')"
            @drop.prevent="dragCounter.script = 0; handleScriptDrop($event); $el.classList.remove('drop-zone-active')"
            @click="$refs.scriptInput.click()"
          >
            <input x-ref="scriptInput" type="file" accept=".txt"
                   class="hidden" @change="handleScriptFile($event)" />

            <template x-if="!scriptFile">
              <div>
                <svg class="mx-auto w-12 h-12 text-gray-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p class="text-gray-300 font-medium">Drop script here</p>
                <p class="text-gray-500 text-sm mt-1">TXT file, one sentence per line</p>
              </div>
            </template>
            <template x-if="scriptFile">
              <div class="space-y-2">
                <div class="flex items-center justify-center gap-2">
                  <svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                  <span class="text-emerald-300 font-medium truncate" x-text="scriptFile.name"></span>
                </div>
                <div class="text-xs text-gray-400 space-y-0.5">
                  <p x-text="scriptMetadata.lineCount + ' sentences'"></p>
                  <p x-text="scriptMetadata.wordCount + ' words'"></p>
                </div>
                <button class="text-gray-500 hover:text-red-400 transition-colors text-xs mt-2"
                        @click.stop="scriptFile = null; scriptMetadata = { lineCount: 0, wordCount: 0 }">Change file</button>
              </div>
            </template>
          </div>
        </div>

        <!-- File size warnings -->
        <template x-if="audioFile && audioFile.size > 200 * 1024 * 1024">
          <div class="flex items-start gap-2 text-sm text-yellow-400 bg-yellow-900/20 rounded-lg px-4 py-3 border border-yellow-800/50">
            <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span>Large file detected — processing may take several minutes</span>
          </div>
        </template>

        <template x-if="scriptFile && scriptMetadata.lineCount === 0">
          <div class="flex items-start gap-2 text-sm text-red-400 bg-red-900/20 rounded-lg px-4 py-3 border border-red-800/50">
            <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>Script file appears to be empty</span>
          </div>
        </template>

        <!-- Advanced options (Settings) -->
        <div class="rounded-xl border border-gray-800 bg-gray-900 overflow-hidden">
          <button class="w-full flex items-center justify-between px-5 py-3 text-sm text-gray-400
                         hover:text-gray-200 transition-colors"
                  @click="showAdvanced = !showAdvanced">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
              </svg>
              <span class="font-medium">Settings</span>
            </div>
            <div class="text-xs text-gray-500" x-show="!showAdvanced">
              <span x-text="(opts.wordLevel ? 'Word-level' : 'Sentence-level') + ' · ' + opts.offsetMs + 'ms offset · ' + opts.maxChars + ' chars'"></span>
            </div>
            <svg class="w-4 h-4 transition-transform duration-200"
                 :class="showAdvanced ? 'rotate-180' : ''"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div x-show="showAdvanced" x-collapse class="border-t border-gray-800">
            <div class="px-5 py-4 grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1.5 uppercase tracking-wider">Alignment</label>
                <select x-model="opts.wordLevel"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                               text-gray-200 focus:outline-none focus:border-violet-500">
                  <option :value="true">Word-level (default)</option>
                  <option :value="false">Sentence-level</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1.5 uppercase tracking-wider">Offset (ms)</label>
                <input type="number" x-model.number="opts.offsetMs"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                              text-gray-200 focus:outline-none focus:border-violet-500"
                       placeholder="0" />
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1.5 uppercase tracking-wider">Max chars</label>
                <input type="number" x-model.number="opts.maxChars"
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                              text-gray-200 focus:outline-none focus:border-violet-500"
                       placeholder="42" />
              </div>
            </div>
          </div>
        </div>

        <!-- Error banner -->
        <div x-show="uploadError" x-transition
             class="rounded-xl border border-red-800 bg-red-950/30 px-5 py-3 text-sm text-red-400"
             x-text="uploadError">
        </div>

        <!-- CTA button -->
        <button
          class="w-full py-3.5 rounded-xl font-semibold text-white transition-all duration-200
                 bg-violet-600 hover:bg-violet-500 active:scale-[0.98]
                 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-violet-600"
          :disabled="!audioFile || !scriptFile || submitting"
          @click="submit()"
          @keydown.ctrl.enter="submit()"
          @keydown.cmd.enter="submit()">
          <span x-show="!submitting">Generate Captions</span>
          <span x-show="submitting" class="flex items-center justify-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            Uploading…
          </span>
        </button>
      </section>

      <!-- ─── Progress Screen ──────────────────────────────── -->
      <section x-show="screen === 'progress'" class="w-full max-w-2xl animate-fade-up">
        <div class="rounded-2xl border border-gray-800 bg-gray-900 p-8 space-y-7">
          <div>
            <h2 class="text-lg font-semibold text-white">Processing</h2>
            <p class="text-sm text-gray-400 mt-0.5" x-text="audioName"></p>
          </div>

          <!-- Steps with timing -->
          <ol class="space-y-3">
            <template x-for="step in steps" :key="step.stage">
              <li class="flex items-center gap-4">
                <div class="w-6 h-6 shrink-0 flex items-center justify-center">
                  <template x-if="step.done">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                  </template>
                  <template x-if="step.active && !step.done">
                    <svg class="w-5 h-5 text-violet-400 animate-spin-slow" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                      <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
                    </svg>
                  </template>
                  <template x-if="!step.done && !step.active">
                    <div class="w-2 h-2 rounded-full bg-gray-700 mx-auto"></div>
                  </template>
                </div>
                <div class="flex-1">
                  <span class="text-sm"
                        :class="step.done ? 'text-emerald-400' : step.active ? 'text-gray-100' : 'text-gray-600'"
                        x-text="step.label">
                  </span>
                  <template x-if="step.done && step.duration">
                    <span class="text-xs text-gray-500 ml-2" x-text="step.duration + 's'"></span>
                  </template>
                </div>
              </li>
            </template>
          </ol>

          <!-- Progress bar with shimmer -->
          <div>
            <div class="flex justify-between items-center text-xs text-gray-500 mb-2">
              <span x-text="progress.message || 'Starting…'"></span>
              <div class="flex items-center gap-2">
                <span x-text="'Elapsed: ' + formatElapsed(elapsedSecs)"></span>
                <span x-text="progress.pct + '%'"></span>
              </div>
            </div>
            <template x-if="progress.pct > 35">
              <p class="text-xs text-gray-500 mb-2">~45–90s remaining</p>
            </template>
            <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
              <div class="h-full rounded-full bg-gradient-to-r from-violet-600 to-violet-400 progress-bar relative overflow-hidden"
                   :style="`width: ${progress.pct}%`">
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shimmer"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ─── Results Screen ──────────────────────────────── -->
      <section x-show="screen === 'results'" class="w-full max-w-2xl space-y-5 animate-fade-up">

        <!-- Hero card -->
        <div class="rounded-2xl border border-gray-800 bg-gray-900 p-8">
          <div class="flex items-start justify-between gap-4 mb-6">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                <h2 class="text-lg font-semibold text-white">Done!</h2>
              </div>
              <p class="text-sm text-gray-400">
                <span class="text-gray-200 font-medium" x-text="result.captionCount"></span> captions
              </p>
              <p class="text-xs text-gray-500 mt-1">Saved to history</p>
            </div>
            <!-- Grade badge with tooltip -->
            <div class="shrink-0 relative">
              <button @mouseenter="gradeHover = true" @mouseleave="gradeHover = false"
                      class="text-3xl font-bold w-14 h-14 rounded-2xl flex items-center justify-center transition-transform hover:scale-105"
                      :class="{
                        'bg-emerald-900/60 text-emerald-300': result.grade === 'A',
                        'bg-blue-900/60 text-blue-300':    result.grade === 'B',
                        'bg-yellow-900/60 text-yellow-300': result.grade === 'C',
                        'bg-orange-900/60 text-orange-300': result.grade === 'D',
                        'bg-red-900/60 text-red-300':       result.grade === 'F',
                      }"
                      x-text="result.grade || '—'">
              </button>
              <!-- Grade tooltip -->
              <div x-show="gradeHover" x-transition:enter="transition ease-out duration-200" x-transition:leave="transition ease-in duration-100"
                   class="absolute right-0 top-16 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 whitespace-nowrap shadow-xl z-50"
                   x-text="gradeTooltip(result.grade)">
              </div>
              <p class="text-[10px] text-gray-600 text-center mt-1 uppercase tracking-wider">Grade</p>
            </div>
          </div>

          <!-- Quality metrics grid -->
          <div x-show="result.metrics" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
            <template x-if="result.metrics">
              <template x-for="item in qualityItems()" :key="item.label">
                <div class="bg-gray-800/60 rounded-xl p-3">
                  <p class="text-xs text-gray-500 mb-1" x-text="item.label"></p>
                  <p class="text-sm font-semibold"
                     :class="item.bad ? 'text-red-400' : 'text-gray-100'"
                     x-text="item.value">
                  </p>
                  <template x-if="item.bad && item.helpText">
                    <p class="text-xs text-red-400/70 mt-1" x-text="item.helpText"></p>
                  </template>
                </div>
              </template>
            </template>
          </div>

          <!-- Warnings -->
          <template x-if="result.warnings && result.warnings.length > 0">
            <div class="mb-6 space-y-2">
              <template x-for="w in result.warnings" :key="w">
                <div class="flex items-start gap-2 text-sm text-yellow-400 bg-yellow-900/20 rounded-lg px-3 py-2">

                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>
                  <span x-text="w"></span>
                </div>

          <!-- Suggestions -->
          <template x-if="result.suggestions && result.suggestions.length > 0">

          <!-- Actions -->

        <!-- SRT Preview (expandable) -->
        <div x-show="srtPreview.length > 0"

    <!-- ─── HISTORY TAB ────────────────────────────────────────────────────── -->

      <!-- Loading state -->
      <template x-if="historyLoading">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <template x-for="i in 3">

              <div class="h-4 bg-gray-800 rounded w-2/3"></div>
              <div class="h-3 bg-gray-800 rounded w-1/3"></div>
              <div class="flex gap-2 pt-2">
                <div class="h-8 bg-gray-800 rounded-lg w-20"></div>
                <div class="h-8 bg-gray-800 rounded-lg w-20"></div>
                <div class="h-8 bg-gray-800 rounded-lg w-20"></div>
              </div>

      <!-- Empty state -->
      <template x-if="!historyLoading && filteredHistory().length === 0">
        <div class="rounded-2xl border border-gray-800 bg-gray-900 p-12 text-center">
          <svg class="w-16 h-16 mx-auto text-gray-700 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
          </svg>
          <h3 class="text-lg font-semibold text-gray-300 mb-1">No generated files yet</h3>
          <p class="text-sm text-gray-500 mb-6">Generate your first SRT to see it here</p>
          <button @click="activeTab = 'new-job'"

                        class="text-xs px-3 py-2 rounded-lg transition-colors font-medium flex items-center gap-1">
                  <span x-text="expandedPreviews[job.id] ? '▼' : '▶'"></span>
                  Preview

                <button @click="copyHistorySrt(job.id)"
                        class="text-xs px-3 py-2 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700 transition-colors font-medium">

                <a :href="`/download/${job.id}`"

                <button @click="deleteHistoryJob(job.id)"

              <!-- Preview panel (expandable) -->
              <template x-if="expandedPreviews[job.id]">

                  <p class="text-xs text-gray-500 uppercase tracking-wider">SRT Preview</p>
                  <div class="space-y-2 font-mono text-xs max-h-64 overflow-y-auto bg-gray-800/40 rounded-lg p-3">
                    <template x-for="cap in historyPreviews[job.id] || []" :key="cap.index">
                      <div class="space-y-0.5">
                        <span class="text-gray-600" x-text="cap.index"></span>
                        <span class="text-gray-500 text-[10px]" x-text="cap.time"></span>
                        <p class="text-gray-200 break-words" dir="auto" x-text="cap.text"></p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Error message -->
      <template x-if="historyError && !historyLoading">
        <div class="rounded-2xl border border-red-800 bg-red-950/30 p-6 text-center">
          <p class="text-sm text-red-400" x-text="historyError"></p>
        </div>

  </div>

  <!-- ─── Toast Notification ──────────────────────────────────────────────── -->
  <div x-show="toast.show"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-4"
       class="fixed bottom-6 right-6 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-xl
              border text-sm font-medium max-w-sm"
       :class="{
         'bg-emerald-900/90 border-emerald-700 text-emerald-200': toast.type === 'success',
         'bg-red-900/90 border-red-700 text-red-200':            toast.type === 'error',
         'bg-gray-800/90 border-gray-700 text-gray-200':         toast.type === 'info',
       }">
    <span x-text="toast.message"></span>
    <button @click="toast.show = false" class="ml-1 opacity-60 hover:opacity-100 text-lg leading-none">×</button>
  </div>

</div><!-- /app root -->

<!-- ─── Alpine.js app logic ─────────────────────────────────────────────────── -->
<script>
function app() {
  return {
    // ─── UI State ────────────────────────────────────
    activeTab: 'new-job',
    screen: 'upload',
    showAdvanced: false,
    submitting: false,
    uploadError: '',
    darkMode: true,
    gradeHover: false,
    srtPreviewExpanded: false,
    errorDetailsExpanded: false,

    // ─── Files ────────────────────────────────────────
    audioFile: null,
    scriptFile: null,
    audioName: '',
    jobName: '',
    dragCounter: { audio: 0, script: 0 },
    scriptMetadata: { lineCount: 0, wordCount: 0 },

    // ─── Options ──────────────────────────────────────
    opts: {
      wordLevel: true,
      offsetMs: 0,
      maxChars: 42,
    },

    // ─── Job ──────────────────────────────────────────
    jobId: null,

    // ─── Progress ────────────────────────────────────
    progress: { stage: '', message: '', pct: 0 },
    steps: [
      { stage: 'validating',    label: 'Validating inputs',    done: false, active: false, duration: 0 },
      { stage: 'normalizing',   label: 'Normalising audio',    done: false, active: false, duration: 0 },
      { stage: 'loading_model', label: 'Loading MMS_FA model', done: false, active: false, duration: 0 },
      { stage: 'aligning',      label: 'Running alignment',    done: false, active: false, duration: 0 },
      { stage: 'writing',       label: 'Writing SRT',          done: false, active: false, duration: 0 },
      { stage: 'quality',       label: 'Quality analysis',     done: false, active: false, duration: 0 },
    ],
    stepStartTimes: {},
    elapsedSecs: 0,
    elapsedTimer: null,

    // ─── Results ──────────────────────────────────
    result: { captionCount: 0, grade: '', metrics: null, suggestions: [], warnings: [] },
    srtPreview: [],
    srtFull: '',
    errorMsg: '',

    // ─── History ──────────────────────────────────
    activeTab: 'new-job',
    historyJobs: [],
    historyLoading: false,
    historySearch: '',
    historyError: '',
    previewCache: {},
    historyPreviews: {},
    expandedPreviews: {},

    // ─── Toast ────────────────────────────────────
    toast: { show: false, message: '', type: 'success' },
    toastTimer: null,

    // ─── Initialization ─────────────────────────────
    init() {
      // Restore dark mode from localStorage
      const savedDarkMode = localStorage.getItem('darkMode');
      if (savedDarkMode !== null) {
        this.darkMode = savedDarkMode === 'true';
      }
      this.applyDarkMode();

      // Pre-fetch history count
      this.loadHistory();

      // Keyboard shortcuts
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'n' || e.key === 'N') this.activeTab = 'new-job';
        if (e.key === 'h' || e.key === 'H') { this.activeTab = 'history'; this.loadHistory(); }
        if (e.key === 'Escape') {
          this.toast.show = false;
          this.gradeHover = false;
        }
      });
    },

    // ─── File Handlers ────────────────────────────────
    handleAudioDrop(e) {
      const f = e.dataTransfer.files[0];
      if (f) {
        this.audioFile = f;
        this.jobName = f.name.split('.').slice(0, -1).join('.');
      }
    },
    handleAudioFile(e) {
      const f = e.target.files[0];
      if (f) {
        this.audioFile = f;
        this.jobName = f.name.split('.').slice(0, -1).join('.');
      }
    },
    handleScriptDrop(e) {
      const f = e.dataTransfer.files[0];
      if (f) {
        this.scriptFile = f;
        this.readScriptMetadata(f);
      }
    },
    handleScriptFile(e) {
      const f = e.target.files[0];
      if (f) {
        this.scriptFile = f;
        this.readScriptMetadata(f);
      }
    },
    readScriptMetadata(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const lines = text.trim().split('\n').filter(l => l.trim().length > 0);
          const words = text.trim().split(/\s+/).length;
          this.scriptMetadata = { lineCount: lines.length, wordCount: words };
        } catch (_) {
          this.scriptMetadata = { lineCount: 0, wordCount: 0 };
        }
      };
      reader.readAsText(file);
    },
    getFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    },
    getAudioDuration(bytes) {
      // Rough estimate: assume 128 kbps bitrate
      const seconds = (bytes / (128000 / 8));
      const mins = Math.round(seconds / 60);
      return Math.max(1, mins);
    },

    // ─── Submit / SSE ────────────────────────────────
    async submit() {
      this.uploadError = '';
      this.submitting = true;

      const fd = new FormData();
      fd.append('audio', this.audioFile);
      fd.append('script', this.scriptFile);
      fd.append('word_level', this.opts.wordLevel);
      fd.append('offset_ms', this.opts.offsetMs);
      fd.append('max_chars', this.opts.maxChars);

      let res;
      try {
        res = await fetch('/api/jobs/single', { method: 'POST', body: fd });
      } catch (err) {
        this.uploadError = 'Network error — is the server running?';
        this.submitting = false;
        return;
      }

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        this.uploadError = body.detail || `Server error ${res.status}`;
        this.submitting = false;
        return;
      }

      const { job_id, audio_name } = await res.json();
      this.jobId = job_id;
      this.audioName = audio_name;
      this.submitting = false;
      this.screen = 'progress';
      this.elapsedSecs = 0;
      this.stepStartTimes = {};

      // Start elapsed timer
      if (this.elapsedTimer) clearInterval(this.elapsedTimer);
      this.elapsedTimer = setInterval(() => {
        this.elapsedSecs++;
      }, 1000);

      this.listenToJob(job_id);
    },

    listenToJob(jobId) {
      const es = new EventSource(`/api/jobs/${jobId}/stream`);
      const stageOrder = ['validating','normalizing','loading_model','aligning','writing','quality'];

      es.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        this.progress = ev;

        const idx = this.steps.findIndex(s => s.stage === ev.stage);
        const now = Date.now();

        this.steps.forEach((s, i) => {
          if (i < idx) {
            s.done = true;
            s.active = false;
            if (!s.duration && this.stepStartTimes[s.stage]) {
              const elapsed = (now - this.stepStartTimes[s.stage]) / 1000;
              s.duration = Math.max(0.1, elapsed.toFixed(1));
            }
          } else if (i === idx) {
            s.done = false;
            s.active = true;
            if (!this.stepStartTimes[s.stage]) {
              this.stepStartTimes[s.stage] = now;
            }
          } else {
            s.done = false;
            s.active = false;
          }
        });

        if (ev.stage === 'done') {
          es.close();
          if (this.elapsedTimer) clearInterval(this.elapsedTimer);
          this.result.captionCount = ev.caption_count || 0;
          this.result.grade = ev.grade || '';
          this.result.warnings = ev.warnings || [];
          this.steps.forEach(s => { s.done = true; s.active = false; });
          this.fetchQuality(jobId).then(() => {
            this.fetchPreview(jobId).then(() => {
              this.screen = 'results';
            });
          });
        }

        if (ev.stage === 'error') {
          es.close();
          if (this.elapsedTimer) clearInterval(this.elapsedTimer);
          this.errorMsg = ev.message;
          this.screen = 'error';
        }
      };

      es.onerror = () => {
        es.close();
        if (this.elapsedTimer) clearInterval(this.elapsedTimer);
        if (this.screen === 'progress') {
          this.errorMsg = 'Lost connection to server.';
          this.screen = 'error';
        }
      };
    },

    async fetchQuality(jobId) {
      try {
        const res = await fetch(`/api/jobs/${jobId}/quality`);
        if (!res.ok) return;
        const data = await res.json();
        this.result.metrics = data.metrics;
        this.result.suggestions = data.suggestions;
        if (data.metrics?.grade) this.result.grade = data.metrics.grade;
      } catch (_) {}
    },

    async fetchPreview(jobId) {
      try {
        const res = await fetch(`/api/jobs/${jobId}/download`);
        if (!res.ok) return;
        this.srtFull = await res.text();
        this.srtPreview = this.parseSrtPreview(this.srtFull, 10);
      } catch (_) {}
    },

    parseSrtPreview(srt, limit) {
      const blocks = srt.trim().split(/\r?\n\r?\n/);
      return blocks.slice(0, limit).map(block => {
        const lines = block.trim().split(/\r?\n/);
        const text = lines.slice(2).join(' ') || '';
        return {
          index: lines[0] || '',
          time:  lines[1] || '',
          text:  text,
          charCount: text.length,
        };
      });
    },

    async copySrt() {
      try {
        await navigator.clipboard.writeText(this.srtFull);
        this.showToast('SRT copied to clipboard', 'success');
      } catch (_) {
        this.showToast('Failed to copy to clipboard', 'error');
      }
    },

    qualityItems() {
      const m = this.result.metrics;
      if (!m) return [];
      return [
        {
          label: 'Total captions',
          value: m.total_captions,
          bad: false,
        },
        {
          label: 'Avg duration',
          value: Math.round(m.avg_duration_ms) + ' ms',
          bad: m.avg_duration_ms < 200,
          helpText: m.avg_duration_ms < 200 ? 'Very short captions may be hard to read' : undefined,
        },
        {
          label: 'Overlaps',
          value: m.overlapping_count,
          bad: m.overlapping_count > 0,
          helpText: m.overlapping_count > 0 ? 'Captions overlap in time — CapCut may display incorrectly' : undefined,
        },
        {
          label: 'Short captions',
          value: m.short_caption_count,
          bad: m.short_caption_count > 0,
          helpText: m.short_caption_count > 0 ? 'Consider merging short captions for readability' : undefined,
        },
        {
          label: 'Long captions',
          value: m.long_caption_count,
          bad: m.long_caption_count > 0,
          helpText: m.long_caption_count > 0 ? 'Long captions may wrap in CapCut' : undefined,
        },
        {
          label: 'Large gaps',
          value: m.gaps_too_large,
          bad: m.gaps_too_large > 0,
          helpText: m.gaps_too_large > 0 ? 'Silent periods longer than expected' : undefined,
        },
      ];
    },

    gradeTooltip(grade) {
      return {
        'A': 'Excellent: no overlaps, no short/long captions, gaps within spec',
        'B': 'Good: minor issues, fully usable in CapCut',
        'C': 'Acceptable: some timing imperfections',
        'D': 'Needs review: multiple quality warnings',
        'F': 'Failed: significant alignment problems',
      }[grade] || '';
    },

    formatElapsed(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    },

    // ─── History ──────────────────────────────────
    async loadHistory() {
      this.historyLoading = true;
      this.historyError = '';
      try {
        const res = await fetch('/history');
        if (!res.ok) throw new Error('Failed to fetch history');
        this.historyJobs = await res.json();
      } catch (err) {
        this.historyError = 'Failed to load history: ' + err.message;
      } finally {
        this.historyLoading = false;
      }
    },

    filteredHistory() {
      if (!this.historySearch) return this.historyJobs;
      const q = this.historySearch.toLowerCase();
      return this.historyJobs.filter(j =>
        (j.job_name || '').toLowerCase().includes(q)
      );
    },

    async toggleHistoryPreview(jobId) {
      if (this.expandedPreviews[jobId]) {
        this.expandedPreviews[jobId] = false;
        return;
      }

      // Fetch if not cached
      if (!this.previewCache[jobId]) {
        try {
          const res = await fetch(`/download/${jobId}`);
          if (!res.ok) throw new Error('Failed to fetch SRT');
          const srt = await res.text();
          this.previewCache[jobId] = srt;
          this.historyPreviews[jobId] = this.parseSrtPreview(srt, 5);
        } catch (err) {
          this.showToast('Failed to load preview', 'error');
          return;
        }
      } else {
        this.historyPreviews[jobId] = this.parseSrtPreview(this.previewCache[jobId], 5);
      }

      this.expandedPreviews[jobId] = true;
    },

    async copyHistorySrt(jobId) {
      try {
        let srt = this.previewCache[jobId];
        if (!srt) {
          const res = await fetch(`/download/${jobId}`);
          if (!res.ok) throw new Error('Failed to fetch SRT');
          srt = await res.text();
          this.previewCache[jobId] = srt;
        }
        await navigator.clipboard.writeText(srt);
        this.showToast('SRT copied to clipboard', 'success');
      } catch (err) {
        this.showToast('Failed to copy to clipboard', 'error');
      }
    },

    async deleteHistoryJob(jobId) {
      try {
        const res = await fetch(`/job/${jobId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete job');
        this.historyJobs = this.historyJobs.filter(j => j.id !== jobId);
        delete this.previewCache[jobId];
        delete this.historyPreviews[jobId];
        delete this.expandedPreviews[jobId];
        this.showToast('Job deleted', 'info');
      } catch (err) {
        this.showToast('Failed to delete job: ' + err.message, 'error');
      }
    },

    formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    },

    // ─── Toast ────────────────────────────────────
    showToast(message, type = 'success', duration = 3500) {
      clearTimeout(this.toastTimer);
      this.toast = { show: true, message, type };
      this.toastTimer = setTimeout(() => { this.toast.show = false; }, duration);
    },

    // ─── Dark Mode ────────────────────────────────
    applyDarkMode() {
      document.documentElement.classList.toggle('dark', this.darkMode);
      document.body.classList.toggle('light-mode', !this.darkMode);
      localStorage.setItem('darkMode', this.darkMode);
    },

    // ─── Reset ────────────────────────────────────
    reset() {
      if (this.jobId) {
        fetch(`/api/jobs/${this.jobId}`, { method: 'DELETE' }).catch(() => {});
      }
      if (this.elapsedTimer) clearInterval(this.elapsedTimer);

      this.screen = 'upload';
      this.audioFile = null;
      this.scriptFile = null;
      this.audioName = '';
      this.jobId = null;
      this.jobName = '';
      this.progress = { stage: '', message: '', pct: 0 };
      this.steps.forEach(s => { s.done = false; s.active = false; s.duration = 0; });
      this.result = { captionCount: 0, grade: '', metrics: null, suggestions: [], warnings: [] };
      this.srtPreview = [];
      this.srtFull = '';
      this.errorMsg = '';
      this.uploadError = '';
      this.scriptMetadata = { lineCount: 0, wordCount: 0 };
      this.elapsedSecs = 0;
      this.srtPreviewExpanded = false;
      this.errorDetailsExpanded = false;
    },
  };
}
</script>
